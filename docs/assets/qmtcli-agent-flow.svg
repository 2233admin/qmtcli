<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" aria-labelledby="title desc" role="img" viewBox="0 0 1200 520"><title id="title">qmtcli agent flow</title><desc id="desc">AI agents call qmtcli through JSON stdin/stdout, qmtcli talks to local QMT and XtQuant, broker risk controls remain in charge.</desc><rect width="1200" height="520" fill="#0b1020"/><text x="64" y="72" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">qmtcli: AI Agent to QMT Bridge</text><text x="64" y="112" fill="#a7b0c3" font-family="Segoe UI, Arial, sans-serif" font-size="18">Any agent runtime that can launch a process and exchange JSON can use local QMT / XtQuant.</text><rect width="260" height="170" x="64" y="172" fill="#111827" stroke="#38bdf8" stroke-width="2" rx="14"/><text x="94" y="220" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">AI Agents</text><text x="94" y="258" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="17">OpenClaw / Hermes</text><text x="94" y="286" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="17">Codex / Claude</text><text x="94" y="314" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="17">Custom scripts</text><rect width="260" height="214" x="470" y="150" fill="#10251d" stroke="#22c55e" stroke-width="2" rx="14"/><text x="520" y="200" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">qmtcli</text><text x="500" y="242" fill="#bbf7d0" font-family="Segoe UI, Arial, sans-serif" font-size="17">capabilities / schema</text><text x="500" y="270" fill="#bbf7d0" font-family="Segoe UI, Arial, sans-serif" font-size="17">rpc / JSONL server</text><text x="500" y="298" fill="#bbf7d0" font-family="Segoe UI, Arial, sans-serif" font-size="17">market data / account</text><text x="500" y="326" fill="#bbf7d0" font-family="Segoe UI, Arial, sans-serif" font-size="17">guarded orders</text><rect width="260" height="170" x="876" y="172" fill="#1f1b10" stroke="#f59e0b" stroke-width="2" rx="14"/><text x="924" y="220" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Local QMT</text><text x="912" y="258" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="17">broker login stays local</text><text x="912" y="286" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="17">XtQuant SDK</text><text x="912" y="314" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="17">broker risk checks</text><path stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)" d="M330 254 H462"/><text x="352" y="236" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="16">stdin/stdout JSON</text><path stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)" d="M738 254 H868"/><text x="764" y="236" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="16">local SDK calls</text><rect width="708" height="48" x="246" y="408" fill="#111827" stroke="#334155" rx="10"/><text x="282" y="439" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="17">No hosted server. No credential storage. Dangerous actions are labeled for agent policy.</text><defs><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#94a3b8" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs></svg>